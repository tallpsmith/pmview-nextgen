name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet-tests:
    name: .NET Tests (Tier 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test src/pcp-client-dotnet/PcpClient.sln
      - run: dotnet test src/pcp-godot-bridge/PcpGodotBridge.sln

  godot-csharp-tests:
    name: Godot C# Tests (Tier 2)
    runs-on: ubuntu-latest
    needs: dotnet-tests
    steps:
      - uses: actions/checkout@v4
      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.6.1'
          godot-net: true
          dotnet-version: net8.0
          paths: test/
          project_dir: 'godot-project/'
          timeout: 10

  godot-gdscript-tests:
    name: Godot GDScript Tests (Tier 2)
    runs-on: ubuntu-latest
    needs: dotnet-tests
    steps:
      - uses: actions/checkout@v4
      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.6.1'
          godot-net: false
          godot-force-mono: true
          paths: test/
          project_dir: 'godot-project/'
          timeout: 10
