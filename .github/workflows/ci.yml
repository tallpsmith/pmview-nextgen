name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  dotnet-tests:
    name: .NET Tests (Tier 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Run all .NET unit tests (integration tests run in E2E workflow with pmproxy)
        run: dotnet test pmview-nextgen.sln --filter 'FullyQualifiedName!~Integration'

  godot-unit-tests:
    name: Godot Unit Tests (Tier 2)
    runs-on: ubuntu-latest
    needs: dotnet-tests
    steps:
      - uses: actions/checkout@v4
      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.6.1'
          godot-net: false
          godot-force-mono: true
          paths: test/
          project_dir: 'godot-project/'
          timeout: 10
