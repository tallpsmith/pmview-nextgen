name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  dotnet-tests:
    name: .NET Tests (Tier 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run .NET unit tests (integration tests run in e2e-tests job)
        run: dotnet test pmview-nextgen.ci.slnf --filter 'FullyQualifiedName!~Integration'

  godot-unit-tests:
    name: Godot Unit Tests (Tier 2)
    runs-on: ubuntu-latest
    needs: dotnet-tests
    steps:
      - uses: actions/checkout@v4
      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.6.1'
          godot-net: true
          dotnet-version: net8.0
          paths: test/
          project_dir: 'src/pmview-bridge-addon/'
          timeout: 10

  e2e-tests:
    name: E2E Tests (Tier 3)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, godot-unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Start PCP stack
        working-directory: dev-environment
        run: docker compose up -d

      - name: Wait for PCP to be ready
        working-directory: dev-environment
        run: |
          echo "Waiting for pmproxy on port 54322..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:54322/pmapi/context > /dev/null 2>&1; then
              echo "pmproxy is ready"
              exit 0
            fi
            sleep 2
          done
          echo "pmproxy failed to become ready"
          docker compose logs
          exit 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: PcpClient integration tests
        run: dotnet test src/pcp-client-dotnet/PcpClient.sln --filter 'Category=Integration'

      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.6.1'
          godot-net: true
          paths: test/e2e/
          project_dir: 'src/pmview-bridge-addon/'
          report-name: e2e-test-report.xml
          timeout: 15

      - name: Tear down PCP stack
        if: always()
        working-directory: dev-environment
        run: docker compose down
