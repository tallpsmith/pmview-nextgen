# Fleet: 100 nodes, 3 randomly selected are absolutely cooking with CPU and disk.
# The other 97 sway between moderate activity and near-idle — enough to look
# alive, but the 3 bad actors should stick out like a sore thumb in any dashboard.
meta:
  name: burn-hunt-fleet
  duration: 1h
  interval: 60
  hostname_prefix: node
  hardware: generic-large

profiles:
  # Baseline: moderate workload that ebbs and flows over the hour.
  # Four 15-minute phases oscillating between "doing stuff" and "taking it easy".
  moderate-sway:
    phases:
      - name: warming-up
        duration: 15m
        cpu:
          utilization: 0.35
          user_ratio: 0.60
          sys_ratio: 0.20
          iowait_ratio: 0.05
          noise: 0.08
        memory:
          used_ratio: 0.50
          cache_ratio: 0.25
          noise: 0.05
        disk:
          read_mbps: 15.0
          write_mbps: 8.0
          iops_read: 500
          iops_write: 250
          noise: 0.10
        network:
          rx_mbps: 80.0
          tx_mbps: 40.0
          noise: 0.08

      - name: easing-off
        duration: 15m
        transition: linear
        cpu:
          utilization: 0.12
          user_ratio: 0.55
          sys_ratio: 0.25
          iowait_ratio: 0.03
          noise: 0.08
        memory:
          used_ratio: 0.40
          cache_ratio: 0.30
          noise: 0.05
        disk:
          read_mbps: 3.0
          write_mbps: 1.5
          iops_read: 100
          iops_write: 50
          noise: 0.10
        network:
          rx_mbps: 20.0
          tx_mbps: 10.0
          noise: 0.08

      - name: picking-back-up
        duration: 15m
        transition: linear
        cpu:
          utilization: 0.45
          user_ratio: 0.65
          sys_ratio: 0.18
          iowait_ratio: 0.07
          noise: 0.08
        memory:
          used_ratio: 0.55
          cache_ratio: 0.20
          noise: 0.05
        disk:
          read_mbps: 25.0
          write_mbps: 12.0
          iops_read: 800
          iops_write: 400
          noise: 0.10
        network:
          rx_mbps: 120.0
          tx_mbps: 60.0
          noise: 0.08

      - name: settling-down
        duration: 15m
        transition: linear
        cpu:
          utilization: 0.20
          user_ratio: 0.58
          sys_ratio: 0.22
          iowait_ratio: 0.04
          noise: 0.08
        memory:
          used_ratio: 0.45
          cache_ratio: 0.28
          noise: 0.05
        disk:
          read_mbps: 8.0
          write_mbps: 4.0
          iops_read: 250
          iops_write: 120
          noise: 0.10
        network:
          rx_mbps: 40.0
          tx_mbps: 20.0
          noise: 0.08

  # Bad actor: CPU pegged, disks screaming. The kind of host that makes
  # the on-call engineer's phone buzz at 3am.
  cpu-disk-inferno:
    phases:
      - name: full-burn
        duration: 1h
        cpu:
          utilization: 0.97
          user_ratio: 0.82
          sys_ratio: 0.13
          iowait_ratio: 0.05
          noise: 0.02
        memory:
          used_ratio: 0.78
          cache_ratio: 0.05
          noise: 0.03
        disk:
          read_mbps: 350.0
          write_mbps: 280.0
          iops_read: 12000
          iops_write: 9000
          noise: 0.05
        network:
          rx_mbps: 400.0
          tx_mbps: 300.0
          noise: 0.03

hosts:
  count: 100
  baseline: moderate-sway
  jitter: 0.07

bad_actors:
  count: 3
  jitter: 0.04
  profiles:
    - cpu-disk-inferno
