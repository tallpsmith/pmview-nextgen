# Fleet: 5 xlarge nodes, 1 bad actor getting absolutely smashed on CPU and disk
# 24h of data at 15s intervals — plenty of rope to hang yourself with
meta:
  name: cpu-disk-smashed-fleet
  duration: 24h
  interval: 15
  hostname_prefix: prod
  hardware: generic-xlarge

profiles:
  # The well-behaved majority — doing honest work
  steady-workhorse:
    phases:
      - name: overnight-idle
        duration: 7h
        cpu:
          utilization: 0.12
          user_ratio: 0.55
          sys_ratio: 0.25
          iowait_ratio: 0.08
          noise: 0.03
        memory:
          used_ratio: 0.42
          cache_ratio: 0.30
          noise: 0.02
        disk:
          read_mbps: 15.0
          write_mbps: 8.0
          iops_read: 800
          iops_write: 400
          noise: 0.03
        network:
          rx_mbps: 50.0
          tx_mbps: 25.0
          noise: 0.02

      - name: morning-ramp
        duration: 2h
        transition: linear
        cpu:
          utilization: 0.45
          user_ratio: 0.60
          sys_ratio: 0.22
          iowait_ratio: 0.08
          noise: 0.04
        memory:
          used_ratio: 0.58
          cache_ratio: 0.22
          noise: 0.02
        disk:
          read_mbps: 80.0
          write_mbps: 45.0
          iops_read: 3000
          iops_write: 1500
          noise: 0.04
        network:
          rx_mbps: 300.0
          tx_mbps: 180.0
          noise: 0.03

      - name: peak-hours
        duration: 8h
        cpu:
          utilization: 0.52
          user_ratio: 0.62
          sys_ratio: 0.22
          iowait_ratio: 0.06
          noise: 0.05
        memory:
          used_ratio: 0.64
          cache_ratio: 0.20
          noise: 0.03
        disk:
          read_mbps: 110.0
          write_mbps: 65.0
          iops_read: 4500
          iops_write: 2200
          noise: 0.05
        network:
          rx_mbps: 500.0
          tx_mbps: 350.0
          noise: 0.04

      - name: afternoon-taper
        duration: 3h
        transition: linear
        cpu:
          utilization: 0.30
          user_ratio: 0.58
          sys_ratio: 0.22
          iowait_ratio: 0.08
          noise: 0.04
        memory:
          used_ratio: 0.52
          cache_ratio: 0.25
          noise: 0.02
        disk:
          read_mbps: 50.0
          write_mbps: 25.0
          iops_read: 2000
          iops_write: 1000
          noise: 0.04
        network:
          rx_mbps: 200.0
          tx_mbps: 120.0
          noise: 0.03

      - name: evening-maintenance
        duration: 4h
        cpu:
          utilization: 0.22
          user_ratio: 0.40
          sys_ratio: 0.30
          iowait_ratio: 0.15
          noise: 0.03
        memory:
          used_ratio: 0.48
          cache_ratio: 0.28
          noise: 0.02
        disk:
          read_mbps: 60.0
          write_mbps: 40.0
          iops_read: 2500
          iops_write: 1800
          noise: 0.04
        network:
          rx_mbps: 80.0
          tx_mbps: 50.0
          noise: 0.02

  # The bad actor — CPU pegged and disks screaming for mercy
  cpu-disk-smashed:
    phases:
      - name: pre-incident-normal
        duration: 5h
        cpu:
          utilization: 0.40
          user_ratio: 0.60
          sys_ratio: 0.22
          iowait_ratio: 0.08
          noise: 0.04
        memory:
          used_ratio: 0.55
          cache_ratio: 0.22
          noise: 0.03
        disk:
          read_mbps: 80.0
          write_mbps: 45.0
          iops_read: 3000
          iops_write: 1500
          noise: 0.04
        network:
          rx_mbps: 250.0
          tx_mbps: 150.0
          noise: 0.03

      - name: things-go-south
        duration: 2h
        transition: linear
        cpu:
          utilization: 0.96
          user_ratio: 0.72
          sys_ratio: 0.15
          iowait_ratio: 0.12
          noise: 0.02
        memory:
          used_ratio: 0.78
          cache_ratio: 0.05
          noise: 0.02
        disk:
          read_mbps: 450.0
          write_mbps: 380.0
          iops_read: 25000
          iops_write: 18000
          noise: 0.03
        network:
          rx_mbps: 600.0
          tx_mbps: 400.0
          noise: 0.03

      - name: fully-cooked
        duration: 12h
        cpu:
          utilization: 0.97
          user_ratio: 0.68
          sys_ratio: 0.18
          iowait_ratio: 0.13
          noise: 0.02
        memory:
          used_ratio: 0.85
          cache_ratio: 0.03
          noise: 0.02
        disk:
          read_mbps: 520.0
          write_mbps: 440.0
          iops_read: 30000
          iops_write: 22000
          noise: 0.03
        network:
          rx_mbps: 700.0
          tx_mbps: 500.0
          noise: 0.03

      - name: partial-recovery
        duration: 5h
        transition: linear
        cpu:
          utilization: 0.65
          user_ratio: 0.62
          sys_ratio: 0.20
          iowait_ratio: 0.10
          noise: 0.04
        memory:
          used_ratio: 0.68
          cache_ratio: 0.12
          noise: 0.03
        disk:
          read_mbps: 150.0
          write_mbps: 90.0
          iops_read: 8000
          iops_write: 4000
          noise: 0.04
        network:
          rx_mbps: 350.0
          tx_mbps: 200.0
          noise: 0.03

hosts:
  count: 5
  baseline: steady-workhorse
  jitter: 0.05

bad_actors:
  count: 1
  jitter: 0.03
  profiles:
    - cpu-disk-smashed
