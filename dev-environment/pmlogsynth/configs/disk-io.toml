# Synthetic disk I/O data for development
# Generates sawtooth patterns for disk read/write

[[metrics]]
name = "disk.dev.read"
semantics = "counter"
type = "u64"

[[metrics.instances]]
name = "sda"
pattern = "sawtooth"
min = 0
max = 5000
period_seconds = 60

[[metrics.instances]]
name = "sdb"
pattern = "sawtooth"
min = 0
max = 2000
period_seconds = 90

[[metrics]]
name = "disk.dev.write"
semantics = "counter"
type = "u64"

[[metrics.instances]]
name = "sda"
pattern = "sawtooth"
min = 0
max = 3000
period_seconds = 45

[[metrics.instances]]
name = "sdb"
pattern = "sawtooth"
min = 0
max = 1000
period_seconds = 75
