# pmview-nextgen development stack
# Modelled after https://github.com/tallpsmith/pmmcp/blob/main/docker-compose.yml
#
# Pipeline: pmlogsynth-generator builds archives from YAML profiles,
# pmlogsynth-seeder loads them into pmseries via Valkey, then PCP serves them.
#
# Usage:
#   podman compose up -d
#   podman compose down

volumes:
  valkey-data:
  pmview-archives:

services:
  valkey:
    image: docker.io/valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  pmlogsynth-generator:
    build: ./generator
    volumes:
      - ./profiles:/profiles:ro
      - pmview-archives:/archives

  pmlogsynth-seeder:
    image: quay.io/performancecopilot/pcp:latest
    volumes:
      - pmview-archives:/archives:ro
    environment:
      KEY_SERVERS: valkey:6379
    command:
      - bash
      - -c
      - |
        set -euo pipefail;

        load_archive() {
            local archive_path=$$1;
            local label=$$2;

            echo "INFO: --- $${label} ---";
            echo "INFO: archive contents:";
            ls -lh "$$(dirname "$${archive_path}")/" | head -20;

            echo "INFO: archive bounds:";
            pmdumplog -l "$${archive_path}" 2>&1;

            echo "INFO: loading $${label} into pmseries";
            if ! pmseries --load "$${archive_path}"; then
                echo "ERROR: pmseries --load failed for $${label}";
                return 1;
            fi;

            series_count=$$(pmseries 'kernel.all.cpu.user' 2>/dev/null | wc -l || echo 0);
            echo "INFO: $${label} loaded — $${series_count} kernel.all.cpu.user series now in index";
        };

        for archive_dir in /archives/*/; do
            stem=$$(basename "$$archive_dir");

            if [[ "$${stem}" == fleet-* ]]; then
                echo "INFO: === Fleet: $${stem} ===";
                for data_file in "$${archive_dir}"*.0; do
                    [[ -f "$${data_file}" ]] || continue;
                    archive_path="$${data_file%.0}";
                    host_name=$$(basename "$${archive_path}");
                    load_archive "$${archive_path}" "$${stem}/$${host_name}" || exit 1;
                done;
            else
                load_archive "/archives/$${stem}/$${stem}" "$${stem}" || exit 1;
            fi;
        done;

        echo "INFO: all archives seeded";
    depends_on:
      pmlogsynth-generator:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy

  pcp:
    image: quay.io/performancecopilot/pcp:latest
    privileged: true
    ports:
      - "54322:44322"
    environment:
      KEY_SERVERS: valkey:6379
    depends_on:
      pmlogsynth-seeder:
        condition: service_completed_successfully
