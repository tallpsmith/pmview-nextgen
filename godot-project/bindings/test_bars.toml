# CPU load bar visualisation
# Maps kernel.all.load instances to vertical bar height
# Source ranges tuned for container workloads (typically 0.0-0.5)

[meta]
scene = "res://scenes/test_bars.tscn"
poll_interval_ms = 250
description = "CPU load averages as vertical bars (container-tuned)"

[[bindings]]
scene_node = "LoadBar1Min"
metric = "kernel.all.load"
property = "height"
source_range = [0.0, 0.5]
target_range = [0.2, 5.0]
instance_id = 0

[[bindings]]
scene_node = "LoadBar5Min"
metric = "kernel.all.load"
property = "height"
source_range = [0.0, 0.5]
target_range = [0.2, 5.0]
instance_id = 1

[[bindings]]
scene_node = "LoadBar15Min"
metric = "kernel.all.load"
property = "height"
source_range = [0.0, 0.5]
target_range = [0.2, 5.0]
instance_id = 2
