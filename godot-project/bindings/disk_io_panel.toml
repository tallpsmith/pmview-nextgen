# Disk I/O panel visualisation
# 4 cubes: read+write pair per disk instance

[meta]
scene = "res://scenes/disk_io_panel.tscn"
poll_interval_ms = 500
description = "Disk I/O with spinner and bar per disk"

[[bindings]]
scene_node = "Disk0Read"
metric = "disk.dev.read"
property = "rotation_speed"
source_range = [0.0, 1000.0]
target_range = [0.0, 3600.0]
instance_name = "nvme0n1"

[[bindings]]
scene_node = "Disk0Write"
metric = "disk.dev.write"
property = "rotation_speed"
source_range = [0.0, 1000.0]
target_range = [0.0, 3600.0]
instance_name = "nvme0n1"

[[bindings]]
scene_node = "Disk1Read"
metric = "disk.dev.read"
property = "rotation_speed"
source_range = [0.0, 1000.0]
target_range = [0.0, 3600.0]
instance_name = "nvme1n1"

[[bindings]]
scene_node = "Disk1Write"
metric = "disk.dev.write"
property = "rotation_speed"
source_range = [0.0, 1000.0]
target_range = [0.0, 3600.0]
instance_name = "nvme1n1"
